<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganiyu's Break Out</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --cyan: #00f5ff;
    --magenta: #ff00c8;
    --yellow: #ffe600;
    --green: #00ff88;
    --bg: #020008;
    --panel: #0a0018;
    --glow-cyan: 0 0 10px #00f5ff, 0 0 30px #00f5ff55;
    --glow-mag: 0 0 10px #ff00c8, 0 0 30px #ff00c855;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: white;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,245,255,0.025) 40px, rgba(0,245,255,0.025) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,245,255,0.025) 40px, rgba(0,245,255,0.025) 41px);
    pointer-events: none;
    z-index: 0;
  }

  #game-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.2em;
    background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--cyan));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    text-shadow: none;
    filter: drop-shadow(0 0 12px var(--cyan));
  }

  @keyframes shimmer {
    0% { background-position: 0% }
    100% { background-position: 200% }
  }

  #hud {
    display: flex;
    gap: 40px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .hud-label {
    color: rgba(255,255,255,0.4);
    font-size: 0.6rem;
  }

  .hud-val {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
  }

  #lives-display {
    color: var(--magenta);
    text-shadow: var(--glow-mag);
    letter-spacing: 5px;
    font-size: 1rem;
  }

  canvas {
    display: block;
    border: 1px solid rgba(0,245,255,0.3);
    box-shadow:
      0 0 0 1px rgba(0,245,255,0.1),
      0 0 30px rgba(0,245,255,0.15),
      0 0 80px rgba(0,245,255,0.05),
      inset 0 0 60px rgba(0,0,0,0.8);
    background: var(--panel);
    cursor: none;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(2,0,8,0.88);
    backdrop-filter: blur(2px);
    z-index: 10;
  }

  #overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 0.2em;
  }

  #overlay p {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.8;
  }

  #overlay .score-big {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 0 20px var(--yellow);
  }

  #start-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 12px 36px;
    background: transparent;
    color: var(--cyan);
    border: 1px solid var(--cyan);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
  }

  #start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: translateX(-105%);
    transition: transform 0.25s ease;
    z-index: -1;
  }

  #start-btn:hover {
    color: var(--bg);
    box-shadow: var(--glow-cyan);
  }

  #start-btn:hover::before {
    transform: translateX(0);
  }

  #msg {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.15em;
    margin-top: 8px;
  }

  /* scanline flicker */
  #scan {
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent 50%, rgba(0,0,0,0.06) 50%);
    background-size: 100% 4px;
    pointer-events: none;
    animation: flicker 0.15s steps(1) infinite;
    opacity: 0.5;
    z-index: 20;
  }

  @keyframes flicker {
    0%,100% { opacity: 0.5; }
    50% { opacity: 0.42; }
  }
</style>
</head>
<body>
<div id="game-wrap">
  <h1>GANIYU'S BREAK OUT</h1>
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-val" id="score-disp">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-val" id="level-disp">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span id="lives-display">♦ ♦ ♦</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">HI-SCORE</span>
      <span class="hud-val" id="hi-disp">0</span>
    </div>
  </div>
  <div style="position:relative">
    <canvas id="c"></canvas>
    <div id="scan"></div>
    <div id="overlay">
      <h2 id="ov-title">GANIYU'S BREAK OUT</h2>
      <p id="ov-msg">Move mouse or use ← → keys<br>Click or press SPACE to launch ball</p>
      <div class="score-big" id="ov-score" style="display:none"></div>
      <button id="start-btn">PLAY</button>
      <span id="msg">© ARCADE SYSTEMS</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovMsg = document.getElementById('ov-msg');
const ovScore = document.getElementById('ov-score');
const startBtn = document.getElementById('start-btn');
const scoreDisp = document.getElementById('score-disp');
const levelDisp = document.getElementById('level-disp');
const livesDisp = document.getElementById('lives-display');
const hiDisp = document.getElementById('hi-disp');

// Responsive sizing
function resize() {
  const maxW = Math.min(window.innerWidth - 32, 520);
  const maxH = Math.min(window.innerHeight - 180, 620);
  const ratio = 520 / 620;
  let w = maxW, h = maxW / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width = Math.floor(w);
  canvas.height = Math.floor(h);
}
resize();
window.addEventListener('resize', () => { resize(); initBricks(); resetBall(); });

// Game state
let score = 0, hiScore = 0, lives = 3, level = 1;
let gameState = 'idle'; // idle, playing, dead, win
let animId;

// Paddle
const paddle = { w: 90, h: 10, x: 0, y: 0, speed: 8 };
let paddleTarget = 0;

// Ball
const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 7, stuck: true };
let ballSpeed = 5;

// Bricks
let bricks = [];
const ROWS = 6, COLS = 10, BRICK_PAD = 4;

const BRICK_COLORS = [
  { fill: '#ff003c', stroke: '#ff6688', pts: 70 },
  { fill: '#ff6600', stroke: '#ffaa44', pts: 50 },
  { fill: '#ffe600', stroke: '#fff07a', pts: 40 },
  { fill: '#00ff88', stroke: '#88ffcc', pts: 30 },
  { fill: '#00c8ff', stroke: '#88eeff', pts: 20 },
  { fill: '#cc44ff', stroke: '#ee88ff', pts: 10 },
];

function initBricks() {
  bricks = [];
  const W = canvas.width;
  const brickW = (W - BRICK_PAD * (COLS + 1)) / COLS;
  const brickH = 18;
  const offsetY = 48;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Some bricks need more hits on higher levels
      const maxHp = level >= 3 && r < 2 ? 2 : 1;
      bricks.push({
        x: BRICK_PAD + c * (brickW + BRICK_PAD),
        y: offsetY + r * (brickH + BRICK_PAD),
        w: brickW, h: brickH,
        color: BRICK_COLORS[r],
        alive: true,
        hp: maxHp,
        maxHp,
        flash: 0
      });
    }
  }
}

function resetBall() {
  paddle.w = Math.min(90 + level * 2, 110);
  paddle.h = 10;
  paddle.y = canvas.height - 36;
  paddle.x = canvas.width / 2 - paddle.w / 2;
  paddleTarget = paddle.x;

  ball.r = 7;
  ball.stuck = true;
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - ball.r - 2;

  ballSpeed = 4.5 + level * 0.4;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
  ball.vx = Math.cos(angle) * ballSpeed;
  ball.vy = Math.sin(angle) * ballSpeed;
}

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'ArrowUp') && gameState === 'playing' && ball.stuck) {
    ball.stuck = false;
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  paddleTarget = e.clientX - rect.left - paddle.w / 2;
});

canvas.addEventListener('click', () => {
  if (gameState === 'playing' && ball.stuck) ball.stuck = false;
});

startBtn.addEventListener('click', startGame);

function startGame() {
  score = 0; lives = 3; level = 1;
  overlay.style.display = 'none';
  gameState = 'playing';
  initBricks();
  resetBall();
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function updateHUD() {
  scoreDisp.textContent = score;
  levelDisp.textContent = level;
  hiDisp.textContent = hiScore;
  const hearts = ['♦','♦','♦'].map((h,i) => i < lives ? h : '◇').join(' ');
  livesDisp.textContent = hearts;
}

// Particles
let particles = [];
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
  }
}

// Screen shake
let shakeAmt = 0;
function shake(amt) { shakeAmt = Math.max(shakeAmt, amt); }

function loop() {
  animId = requestAnimationFrame(loop);
  update();
  draw();
  updateHUD();
}

function update() {
  if (gameState !== 'playing') return;

  // Paddle movement
  if (keys['ArrowLeft']) paddleTarget -= 8;
  if (keys['ArrowRight']) paddleTarget += 8;
  paddleTarget = Math.max(0, Math.min(canvas.width - paddle.w, paddleTarget));
  paddle.x += (paddleTarget - paddle.x) * 0.18;

  // Ball follows paddle when stuck
  if (ball.stuck) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    return;
  }

  // Move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collisions
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r > canvas.width) { ball.x = canvas.width - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  // Ball lost
  if (ball.y - ball.r > canvas.height) {
    lives--;
    shake(6);
    if (lives <= 0) {
      gameOver();
    } else {
      resetBall();
    }
    return;
  }

  // Paddle collision
  if (
    ball.y + ball.r >= paddle.y &&
    ball.y - ball.r <= paddle.y + paddle.h &&
    ball.x >= paddle.x - 4 &&
    ball.x <= paddle.x + paddle.w + 4 &&
    ball.vy > 0
  ) {
    ball.y = paddle.y - ball.r;
    const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    const angle = (hit * 0.7) - Math.PI / 2;
    const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    ball.vx = Math.cos(angle) * spd;
    ball.vy = Math.sin(angle) * spd;
    // Ensure ball moves up
    if (ball.vy > 0) ball.vy *= -1;
    spawnParticles(ball.x, paddle.y, '#00f5ff', 5);
  }

  // Brick collision
  let bricksLeft = 0;
  for (const b of bricks) {
    if (!b.alive) continue;
    bricksLeft++;
    if (
      ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
      ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h
    ) {
      b.hp--;
      b.flash = 8;
      if (b.hp <= 0) {
        b.alive = false;
        score += b.color.pts * level;
        if (score > hiScore) hiScore = score;
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color.stroke, 12);
        shake(3);
        bricksLeft--;
      } else {
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color.stroke, 4);
      }

      // Bounce direction
      const overlapL = (ball.x + ball.r) - b.x;
      const overlapR = (b.x + b.w) - (ball.x - ball.r);
      const overlapT = (ball.y + ball.r) - b.y;
      const overlapB = (b.y + b.h) - (ball.y - ball.r);
      const minH = Math.min(overlapL, overlapR);
      const minV = Math.min(overlapT, overlapB);
      if (minH < minV) ball.vx *= -1; else ball.vy *= -1;
      break;
    }
  }

  // Level clear
  if (bricksLeft === 0) {
    level++;
    levelUp();
  }

  // Brick flash update
  for (const b of bricks) if (b.flash > 0) b.flash--;
}

function levelUp() {
  gameState = 'levelup';
  ovTitle.textContent = `LEVEL ${level}`;
  ovMsg.textContent = 'Get ready...';
  ovScore.style.display = 'none';
  startBtn.textContent = 'CONTINUE';
  startBtn.onclick = () => {
    overlay.style.display = 'none';
    gameState = 'playing';
    initBricks();
    resetBall();
    startBtn.onclick = startGame;
  };
  overlay.style.display = 'flex';
}

function gameOver() {
  gameState = 'dead';
  const win = bricks.filter(b => b.alive).length === 0;
  ovTitle.textContent = win ? 'YOU WIN!' : 'GAME OVER';
  ovMsg.textContent = win ? 'Incredible precision!' : 'The grid has defeated you.';
  ovScore.textContent = score;
  ovScore.style.display = 'block';
  startBtn.textContent = 'PLAY AGAIN';
  startBtn.onclick = () => { startGame(); startBtn.onclick = startGame; };
  overlay.style.display = 'flex';
}

function draw() {
  ctx.save();

  // Shake
  if (shakeAmt > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmt * 2,
      (Math.random() - 0.5) * shakeAmt * 2
    );
    shakeAmt *= 0.75;
    if (shakeAmt < 0.3) shakeAmt = 0;
  }

  // Clear
  ctx.clearRect(-20, -20, canvas.width + 40, canvas.height + 40);

  // Background grid glow
  ctx.fillStyle = '#020008';
  ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    const flashing = b.flash > 0 && b.flash % 2 === 0;
    ctx.save();
    ctx.shadowColor = b.color.stroke;
    ctx.shadowBlur = flashing ? 20 : 10;

    // Multi-hit bricks get a special look
    if (b.maxHp > 1 && b.hp === b.maxHp) {
      ctx.fillStyle = '#ffffff22';
      ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    // Fill
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, flashing ? '#ffffff' : b.color.stroke);
    grad.addColorStop(1, flashing ? b.color.stroke : b.color.fill);
    ctx.fillStyle = grad;
    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);

    // Border
    ctx.strokeStyle = b.color.stroke;
    ctx.lineWidth = 1;
    ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);

    // HP indicator dots for tough bricks
    if (b.maxHp > 1) {
      for (let i = 0; i < b.hp; i++) {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(b.x + b.w / 2 - 4 + i * 8, b.y + b.h / 2, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // Particles
  drawParticles();

  // Paddle
  ctx.save();
  const pGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  pGrad.addColorStop(0, '#00f5ff');
  pGrad.addColorStop(1, '#0088bb');
  ctx.fillStyle = pGrad;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 4);
  ctx.fill();
  // Paddle shine
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(paddle.x + 4, paddle.y + 2, paddle.w - 8, 3);
  ctx.restore();

  // Ball
  ctx.save();
  const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.4, '#00f5ff');
  ballGrad.addColorStop(1, '#0044ff');
  ctx.fillStyle = ballGrad;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Ball trail (simple)
  if (!ball.stuck) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,245,255,0.15)';
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 2, ball.y - ball.vy * 2, ball.r * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,245,255,0.07)';
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 4, ball.y - ball.vy * 4, ball.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // "Click to launch" hint
  if (ball.stuck && gameState === 'playing') {
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    ctx.fillStyle = '#00f5ff';
    ctx.font = '11px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText('CLICK OR SPACE TO LAUNCH', canvas.width / 2, canvas.height - 12);
    ctx.restore();
  }

  ctx.restore();
}

// Init idle state
initBricks();
resetBall();
draw();
</script>
</body>
</html>
